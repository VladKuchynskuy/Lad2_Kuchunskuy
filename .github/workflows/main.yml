name: CI/CD Pipeline
on:
  push:
    branches: [ main, master, feature/add-codeowners ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: echo "Build version: 1.0.${{ github.run_number }}" > build_artifact.txt
      - uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: build_artifact.txt

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-artifact
      - run: |
          echo "Deploying to Staging..."
          cat build_artifact.txt

  verify_staging:
    runs-on: ubuntu-latest
    needs: deploy_staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run verify

  deploy_production:
    runs-on: ubuntu-latest
    needs: verify_staging
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-artifact
      - run: |
          echo "Deploying to Production LIVE!"
          cat build_artifact.txt
