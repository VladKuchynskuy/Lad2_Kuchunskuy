name: CI-CD-Pipeline
on:
  push:
    branches: [ main, master ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Unit Tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create Artifact
        run: echo "Build version 1.0.${{ github.run_number }}" > build_artifact.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: build_artifact.txt

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact
      - name: Test Deploy
        run: |
          echo "Deploying to Staging..."
          cat build_artifact.txt

  verify_staging:
    runs-on: ubuntu-latest
    needs: deploy_staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Smoke Tests
        run: npm run verify

  deploy_production:
    runs-on: ubuntu-latest
    needs: verify_staging
    environment: production
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact
      - name: Production Deploy
        run: |
          echo "Deploying to Production LIVE"
          cat build_artifact.txt